<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>braindump</title>
    <meta
      name="description"
      content="Braindump is a simple place to put down ideas, keep them in view, and never lose track of what's on your mind."
    />
    <script>
      const isLocalHost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";

      if (!isLocalHost && !window.location.pathname.endsWith("/dist/")) {
        window.location.replace(new URL("./dist/", window.location.href).toString());
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
